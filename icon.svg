<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a77f5"/>
      <stop offset="100%" stop-color="#07a8ba"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#eef3ff" stop-opacity="0.94"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bgGrad)"/>

  <!-- Top highlight overlay -->
  <rect width="512" height="240" rx="108" fill="rgba(255,255,255,0.07)"/>

  <!-- Calculator body border (subtle) -->
  <rect x="72" y="72" width="368" height="368" rx="36"
        fill="none" stroke="rgba(255,255,255,0.16)" stroke-width="2.5"/>

  <!-- Display screen -->
  <rect x="88" y="88" width="336" height="108" rx="18" fill="url(#screenGrad)"/>

  <!-- Taka symbol on display -->
  <text
    x="256" y="174"
    font-family="'Noto Sans Bengali','Arial Unicode MS',system-ui,sans-serif"
    font-size="72"
    font-weight="800"
    fill="#3d6af2"
    text-anchor="middle">&#x9F3;</text>

  <!-- Row 1 buttons -->
  <rect x="88"  y="220" width="100" height="68" rx="14" fill="rgba(255,255,255,0.20)"/>
  <rect x="206" y="220" width="100" height="68" rx="14" fill="rgba(255,255,255,0.20)"/>
  <rect x="324" y="220" width="100" height="68" rx="14" fill="rgba(255,255,255,0.20)"/>

  <!-- Row 1 button indicators -->
  <circle cx="138" cy="254" r="7" fill="rgba(255,255,255,0.55)"/>
  <circle cx="256" cy="254" r="7" fill="rgba(255,255,255,0.55)"/>
  <circle cx="374" cy="254" r="7" fill="rgba(255,255,255,0.55)"/>

  <!-- Row 2 buttons -->
  <rect x="88"  y="302" width="100" height="68" rx="14" fill="rgba(255,255,255,0.20)"/>
  <rect x="206" y="302" width="100" height="68" rx="14" fill="rgba(255,255,255,0.20)"/>
  <rect x="324" y="302" width="100" height="68" rx="14" fill="rgba(255,255,255,0.20)"/>

  <!-- Row 2 button indicators -->
  <circle cx="138" cy="336" r="7" fill="rgba(255,255,255,0.55)"/>
  <circle cx="256" cy="336" r="7" fill="rgba(255,255,255,0.55)"/>
  <circle cx="374" cy="336" r="7" fill="rgba(255,255,255,0.55)"/>

  <!-- Row 3: small button (left) + wide button (right) -->
  <rect x="88"  y="384" width="100" height="68" rx="14" fill="rgba(255,255,255,0.20)"/>
  <rect x="206" y="384" width="218" height="68" rx="14" fill="rgba(255,255,255,0.88)"/>

  <!-- Row 3 small button indicator -->
  <circle cx="138" cy="418" r="7" fill="rgba(255,255,255,0.55)"/>

  <!-- Equals sign on wide button (centered in the wide button) -->
  <line x1="256" y1="408" x2="374" y2="408"
        stroke="#3d6af2" stroke-width="6" stroke-linecap="round"/>
  <line x1="256" y1="428" x2="374" y2="428"
        stroke="#3d6af2" stroke-width="6" stroke-linecap="round"/>
</svg>
